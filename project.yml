name: Sequence
options:
  bundleIdPrefix: com.sequence
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Sequence:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sequence
        excludes:
          - "**/.DS_Store"
    info:
      path: Sequence/Info.plist
      properties:
        CFBundleDisplayName: Sequence
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.sequence.app.refresh
    entitlements:
      path: Sequence/Sequence.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sequence.app
        PRODUCT_NAME: Sequence
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1"

  SequenceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SequenceTests
    dependencies:
      - target: Sequence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sequence.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Sequence:
    build:
      targets:
        Sequence: all
        SequenceTests: [test]
    test:
      targets:
        - SequenceTests
    run:
      config: Debug
